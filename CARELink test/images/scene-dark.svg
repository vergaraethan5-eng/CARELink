<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="planetGlow" cx="35%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#a5b4fc" stop-opacity="0.9"/>
      <stop offset="60%" stop-color="#6366f1" stop-opacity="0.55"/>
      <stop offset="100%" stop-color="#312e81" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ring" x1="0" x2="1">
      <stop offset="0%" stop-color="#67e8f9" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#fbbf24" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#67e8f9" stop-opacity="0.15"/>
    </linearGradient>
    <pattern id="windows" width="26" height="28" patternUnits="userSpaceOnUse">
      <rect x="6" y="6" width="10" height="14" rx="2" fill="#fde68a" opacity="0.95"/>
    </pattern>
  </defs>

  <!-- Stars -->
  <g opacity="0.9" fill="#e2e8f0">
    <circle cx="120" cy="120" r="2"/><circle cx="220" cy="210" r="1.5"/><circle cx="380" cy="110" r="1.2"/>
    <circle cx="520" cy="190" r="1.8"/><circle cx="640" cy="90" r="1.4"/><circle cx="760" cy="170" r="1.1"/>
    <circle cx="920" cy="120" r="1.6"/><circle cx="1080" cy="210" r="1.2"/><circle cx="1260" cy="140" r="1.7"/>
    <circle cx="1320" cy="260" r="1.2"/><circle cx="980" cy="260" r="1.1"/><circle cx="820" cy="260" r="1.4"/>
    <circle cx="660" cy="260" r="1.2"/><circle cx="480" cy="260" r="1.1"/><circle cx="300" cy="300" r="1.5"/>
    <circle cx="140" cy="320" r="1.3"/><circle cx="240" cy="420" r="1.2"/><circle cx="420" cy="380" r="1.6"/>
    <circle cx="620" cy="420" r="1.1"/><circle cx="820" cy="360" r="1.4"/><circle cx="1040" cy="420" r="1.2"/>
    <circle cx="1220" cy="360" r="1.5"/><circle cx="1360" cy="420" r="1.1"/>
  </g>

  <!-- Planet + glow -->
  <g>
    <circle cx="1150" cy="210" r="115" fill="url(#planetGlow)"/>
    <circle cx="1150" cy="210" r="62" fill="#1e1b4b" opacity="0.9"/>
    <circle cx="1128" cy="190" r="18" fill="#6366f1" opacity="0.35"/>
    <circle cx="1176" cy="228" r="12" fill="#22d3ee" opacity="0.25"/>
    <ellipse cx="1150" cy="230" rx="120" ry="26" fill="none" stroke="url(#ring)" stroke-width="8" opacity="0.85"/>
  </g>

  <!-- Secondary planet -->
  <g opacity="0.95">
    <circle cx="290" cy="190" r="54" fill="#0b1326" opacity="0.85"/>
    <circle cx="270" cy="175" r="16" fill="#22d3ee" opacity="0.18"/>
    <circle cx="310" cy="210" r="10" fill="#fbbf24" opacity="0.12"/>
    <ellipse cx="290" cy="206" rx="78" ry="16" fill="none" stroke="url(#ring)" stroke-width="6" opacity="0.55"/>
  </g>

  <!-- Extra star cluster -->
  <g opacity="0.95" fill="#f8fafc">
    <circle cx="520" cy="80" r="1.3"/><circle cx="552" cy="64" r="1.1"/><circle cx="586" cy="92" r="1.5"/>
    <circle cx="612" cy="66" r="1.2"/><circle cx="640" cy="88" r="1.4"/><circle cx="670" cy="70" r="1.1"/>
  </g>

  <!-- City skyline (dark) -->
  <g transform="translate(0,520)">
    <!-- base haze -->
    <rect x="0" y="250" width="1440" height="130" fill="#0b1223" opacity="0.65"/>

    <!-- Buildings -->
    <g>
      <rect x="30" y="120" width="160" height="280" rx="6" fill="#0b1326" opacity="0.95"/>
      <rect x="210" y="60" width="120" height="340" rx="6" fill="#0a1224" opacity="0.95"/>
      <rect x="350" y="150" width="190" height="250" rx="6" fill="#0c152b" opacity="0.95"/>
      <rect x="570" y="90" width="140" height="310" rx="6" fill="#0a1328" opacity="0.95"/>
      <rect x="730" y="40" width="180" height="360" rx="6" fill="#091226" opacity="0.95"/>
      <rect x="930" y="130" width="150" height="270" rx="6" fill="#0b142a" opacity="0.95"/>
      <rect x="1100" y="80" width="130" height="320" rx="6" fill="#0a1328" opacity="0.95"/>
      <rect x="1250" y="150" width="160" height="250" rx="6" fill="#0b1326" opacity="0.95"/>
    </g>

    <!-- Window lights (on in dark mode) -->
    <g fill="url(#windows)" opacity="0.55">
      <rect x="30" y="120" width="160" height="280" rx="6"/>
      <rect x="210" y="60" width="120" height="340" rx="6" opacity="0.6"/>
      <rect x="350" y="150" width="190" height="250" rx="6" opacity="0.5"/>
      <rect x="570" y="90" width="140" height="310" rx="6" opacity="0.58"/>
      <rect x="730" y="40" width="180" height="360" rx="6" opacity="0.62"/>
      <rect x="930" y="130" width="150" height="270" rx="6" opacity="0.52"/>
      <rect x="1100" y="80" width="130" height="320" rx="6" opacity="0.56"/>
      <rect x="1250" y="150" width="160" height="250" rx="6" opacity="0.5"/>
    </g>

    <!-- Street line -->
    <rect x="0" y="398" width="1440" height="6" fill="#0f172a" opacity="0.9"/>
  </g>
</svg>
