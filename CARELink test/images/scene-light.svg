<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="cloud" x1="0" x2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="100%" stop-color="#e0f2fe" stop-opacity="0.75"/>
    </linearGradient>
    <linearGradient id="building" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0%" stop-color="#334155" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#1f2937" stop-opacity="0.75"/>
    </linearGradient>
  </defs>

  <!-- Clouds -->
  <g fill="url(#cloud)">
    <g opacity="0.95" transform="translate(140,140)">
      <circle cx="0" cy="40" r="34"/><circle cx="40" cy="22" r="44"/><circle cx="90" cy="40" r="34"/><rect x="-10" y="40" width="120" height="50" rx="25"/>
    </g>
    <g opacity="0.9" transform="translate(820,120) scale(1.15)">
      <circle cx="0" cy="40" r="30"/><circle cx="40" cy="18" r="46"/><circle cx="100" cy="40" r="34"/><rect x="-10" y="40" width="130" height="52" rx="26"/>
    </g>
    <g opacity="0.8" transform="translate(520,250) scale(0.95)">
      <circle cx="0" cy="40" r="28"/><circle cx="35" cy="20" r="40"/><circle cx="85" cy="40" r="30"/><rect x="-10" y="40" width="115" height="48" rx="24"/>
    </g>
    <g opacity="0.85" transform="translate(260,260) scale(0.8)">
      <circle cx="0" cy="40" r="26"/><circle cx="32" cy="22" r="36"/><circle cx="78" cy="40" r="28"/><rect x="-10" y="40" width="105" height="46" rx="23"/>
    </g>
    <g opacity="0.75" transform="translate(1050,260) scale(0.85)">
      <circle cx="0" cy="40" r="24"/><circle cx="30" cy="22" r="34"/><circle cx="72" cy="40" r="26"/><rect x="-10" y="40" width="100" height="44" rx="22"/>
    </g>
  </g>

  <!-- Birds -->
  <g fill="none" stroke="#334155" stroke-width="6" stroke-linecap="round" opacity="0.55">
    <path d="M210 210 q 28 -22 56 0"/>
    <path d="M266 210 q 28 -22 56 0"/>
    <path d="M1040 210 q 30 -24 60 0"/>
    <path d="M1100 210 q 30 -24 60 0"/>
    <path d="M760 180 q 22 -18 44 0"/>
    <path d="M804 180 q 22 -18 44 0"/>
    <path d="M420 190 q 24 -18 48 0"/>
    <path d="M468 190 q 24 -18 48 0"/>
    <path d="M920 170 q 20 -16 40 0"/>
    <path d="M960 170 q 20 -16 40 0"/>
  </g>

  <!-- City skyline (light) -->
  <g transform="translate(0,520)">
    <rect x="0" y="250" width="1440" height="130" fill="#e2e8f0" opacity="0.35"/>
    <g fill="url(#building)">
      <rect x="30" y="120" width="160" height="280" rx="6"/>
      <rect x="210" y="60" width="120" height="340" rx="6"/>
      <rect x="350" y="150" width="190" height="250" rx="6"/>
      <rect x="570" y="90" width="140" height="310" rx="6"/>
      <rect x="730" y="40" width="180" height="360" rx="6"/>
      <rect x="930" y="130" width="150" height="270" rx="6"/>
      <rect x="1100" y="80" width="130" height="320" rx="6"/>
      <rect x="1250" y="150" width="160" height="250" rx="6"/>
    </g>
    <rect x="0" y="398" width="1440" height="6" fill="#94a3b8" opacity="0.65"/>
  </g>
</svg>
